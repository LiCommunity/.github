name: Invite issue author to team and reply

on:
  issues:
    types: [opened]

permissions:
  contents: read

jobs:
  invite-and-reply:
    runs-on: ubuntu-latest

    steps:
      - name: Invite author to team and comment with multilingual reminder
        uses: actions/github-script@v7
        env:
          ORG: xxx
          TEAM_SLUG: xxx
          INVITE_URL: https://github.com/orgs/xxx/invitation
        with:
          github-token: ${{ secrets.ORG_MEMBERS_TOKEN }}
          script: |
            const org = process.env.ORG;
            const teamSlug = process.env.TEAM_SLUG;
            const inviteUrl = process.env.INVITE_URL || `https://github.com/orgs/${org}/invitation`;
            const username = context.payload.issue?.user?.login;
            const issueNumber = context.payload.issue?.number;

            if (!username) {
              core.setFailed('Cannot find issue author login.');
              return;
            }

            if (username.endsWith('[bot]')) {
              core.info(`Skip bot user: ${username}`);
              return;
            }

            async function getMembershipState() {
              try {
                const res = await github.request(
                  'GET /orgs/{org}/teams/{team_slug}/memberships/{username}',
                  { org, team_slug: teamSlug, username }
                );
                return res.data.state || 'unknown';
              } catch (error) {
                if (error.status === 404) return 'not_found';
                throw error;
              }
            }

            const beforeState = await getMembershipState();
            core.info(`Membership before action: ${beforeState}`);

            // 添加 / 邀请到团队
            let inviteState = beforeState;
            if (beforeState !== 'active') {
              const result = await github.request(
                'PUT /orgs/{org}/teams/{team_slug}/memberships/{username}',
                {
                  org,
                  team_slug: teamSlug,
                  username,
                  role: 'member'
                }
              );
              inviteState = result.data.state || inviteState;
              core.info(`Membership after action: ${inviteState}`);
            }

            const multilingualBody = [
              `🚀 **Invitation sent / 邀请已发送**`,
              ``,
              `**Quickest access point：** [Click to open the GitHub organization invitation page](${inviteUrl})`,
              `**最重要的入口：** [点击打开 GitHub 组织邀请页](${inviteUrl})`,
              ``,
              `如果你已经收到了邮件，也可以直接去邮箱里找 GitHub 发来的邀请邮件。`,
              `如果页面要求登录，请用发起这个 issue 的 GitHub 账号登录。`,
              ``,
              `---`,
              ``,
              `## English`,
              `You have been invited to join the team.`,
              `Please use the invitation link above first. If you do not see it, check the GitHub invitation email in your inbox.`,
              ``,
              `## 中文`,
              `你已经被邀请加入团队。`,
              `请优先点击上面的邀请页链接；如果没看到，再检查 GitHub 发送到你邮箱的邀请邮件。`,
              ``,
              `## Español`,
              `Tu invitación al equipo ya fue enviada.`,
              `Abre primero el enlace de invitación de arriba. Si no lo ves, revisa el correo electrónico enviado por GitHub.`,
              ``,
              `## 日本語`,
              `チームへの招待を送信しました。`,
              `まず上の招待リンクを開いてください。表示されない場合は、GitHub から届いた招待メールを確認してください。`,
              ``,
              `## Français`,
              `Votre invitation à l’équipe a été envoyée.`,
              `Ouvrez d’abord le lien d’invitation ci-dessus. Si vous ne le voyez pas, vérifiez l’e-mail d’invitation envoyé par GitHub.`,
              ``,
              `## 한국어`,
              `팀 초대가 전송되었습니다.`,
              `먼저 위의 초대 링크를 열어 보세요. 보이지 않으면 GitHub가 보낸 초대 이메일을 확인하세요.`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: multilingualBody
            });

            core.info(`Comment posted on issue #${issueNumber}`);
